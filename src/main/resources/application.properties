# ===============================
# 🚀 Application Config
# ===============================
spring.application.name=core-service
server.port=8080

# ===============================
# 🗄️ Database Configuration (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/user
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# ⚙️ Hibernate / JPA Configuration
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ddl-auto options:
# create | create-drop | update | validate | none
spring.jpa.hibernate.ddl-auto=update

# SQL logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Naming strategy (important for table naming)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ===============================
# 🔥 Connection Pool (HikariCP - Default)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=HikariPool

# ===============================
# 🧠 Hibernate Performance Optimization
# ===============================
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===============================
# 📋 Logging (Debugging ke liye useful)
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# 🌐 Jackson (Optional - API Response formatting)
# ===============================
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false

#=================================
Jwt.secret=my_application_jtw_secret_key_my_application_jtw_secret_key_
Jwt.expiration=3600000
#================================